<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Supermarket MT{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <h1>🛒 Supermarket MT</h1>
                </div>
                <nav>
                    <a href="{{ url_for('index') }}" class="nav-link">Consultar Precio</a>
                    <a href="{{ url_for('login_admin') }}" class="nav-link">Admin</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>Sistema desarrollado por: <strong>Nicoll Jelixza Barbosa Matallana</strong></p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/scanner.js') }}"></script>
</body>
</html>
